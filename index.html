<script>
  AFRAME.registerComponent('colocar-mineral', {
    init: function () {
      let entorno = this.el;
      let mineral = document.querySelector('#mi-mineral');

      entorno.addEventListener('model-loaded', function () {
        let modelo3D = entorno.getObject3D('mesh');
        let baseEncontrada = null;

        // 1. Buscamos el nombre exacto basado en tu nueva captura
        modelo3D.traverse(function (nodo) {
          if (nodo.name === 'BASE DE MINERAL 2') {
            baseEncontrada = nodo;
          }
        });

        if (baseEncontrada) {
          // 2. MAGIA AQUÍ: Calculamos el volumen real del objeto, ignorando su punto de origen
          let cajaDelimitadora = new THREE.Box3().setFromObject(baseEncontrada);
          
          // 3. Obtenemos el centro exacto (X, Z) de ese volumen
          let centroReal = new THREE.Vector3();
          cajaDelimitadora.getCenter(centroReal);

          // 4. Obtenemos la cara superior (el punto más alto en Y del objeto)
          let topeY = cajaDelimitadora.max.y;

          // 5. Le sumamos los 0.8 metros que solicitaste
          let alturaFinal = topeY + 0.8;

          // 6. Movemos el mineral al centro X/Z y a la altura calculada
          mineral.setAttribute('position', `${centroReal.x} ${alturaFinal} ${centroReal.z}`);
          console.log("¡Mineral colocado calculando el volumen real de la base!");
          
        } else {
          console.warn("No se encontró la base. Asegúrate de que exportaste el archivo después de renombrarlos.");
        }
      });
    }
  });
</script>
