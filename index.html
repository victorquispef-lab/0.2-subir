<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Mi Recorrido 3D</title>
    <!-- Librerías necesarias para la carga del modelo y movimiento -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
  </head>
  <body>
    <a-scene>
      <!-- Definición de los activos (archivos GLB) -->
      <a-assets>
        <a-asset-item id="ambiente" src="untitled.glb"></a-asset-item>
        <a-asset-item id="modelo-mineral" src="2. malachite_mineral.glb"></a-asset-item>
      </a-assets>

      <!-- Modelo del entorno -->
      <a-entity gltf-model="#ambiente"></a-entity>

      <!-- Modelo del mineral con coordenadas calculadas para tu base -->
      <!-- Coordenadas: X=-32, Y=0.8 (altura base + 0.8m), Z=5.5 -->
      <a-entity id="mi-mineral" gltf-model="#modelo-mineral" position="-32 0.8 5.5"></a-entity>

      <!-- Jugador: Cámara a 2.0 m de altura con controles tipo caminata (WASD o Flechas) -->
      <a-entity movement-controls="speed: 0.45">
        <a-entity camera position="0 2.0 0" look-controls></a-entity>
      </a-entity>
      
      <!-- Luz básica para que no se vea oscuro el modelo -->
      <a-light type="ambient" color="#ffffff" intensity="0.7"></a-light>
    </a-scene>
  </body>
</html>
